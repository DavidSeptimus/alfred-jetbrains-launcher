name: release

# Cut a release from GitHub: Actions → "release" → Run workflow, pick the bump
# ("auto" derives it from the Conventional Commits since the last tag). The job
# regenerates the changelog, builds the universal .alfredworkflow, commits the
# VERSION + CHANGELOG bump, tags it, and publishes the release with changelog notes.
# (Runs on macOS for sips/iconutil/lipo/codesign.)
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (auto = derive from Conventional Commits)"
        type: choice
        options: [auto, patch, minor, major]
        default: auto

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags, so the version can be derived

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.23"

      # Determine the next version AND regenerate the full CHANGELOG.md in one step.
      # git-cliff --bump derives the version from the unreleased Conventional Commits
      # (feat → minor, fix → patch, breaking → major); a non-"auto" dispatch input
      # forces that level instead. The action exposes the result as outputs.version.
      - name: Update CHANGELOG.md and compute version
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: ${{ inputs.bump == 'auto' && '--bump' || format('--bump {0}', inputs.bump) }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Resolve version
        id: ver
        env:
          TAG: ${{ steps.changelog.outputs.version }}
        run: |
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::git-cliff produced no version — no releasable commits since the last tag?"; exit 1
          fi
          version="${TAG#v}"      # strip any leading v
          tag="v${version}"        # …and re-add it so the tag is always v-prefixed
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::tag $tag already exists"; exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (bump=${{ inputs.bump }})"

      # The same generator, but only this release's section — used verbatim as the
      # GitHub Release body (replacing GitHub's auto --generate-notes).
      - name: Build release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --tag ${{ steps.ver.outputs.tag }} --unreleased --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Build and package
        # Build before tagging so a build failure leaves no orphan tag. The
        # version is passed explicitly; icons fall back to the vendored set since
        # no JetBrains apps are installed on the runner.
        run: make dist VERSION="${{ steps.ver.outputs.version }}"

      - name: Commit version bump + changelog and tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "$VERSION" > VERSION
          git add VERSION CHANGELOG.md
          if git diff --cached --quiet; then
            echo "VERSION and CHANGELOG already current — tagging the current commit."
          else
            # Conventional + skipped by cliff.toml, so it never appears in the changelog.
            git commit -m "chore(release): $TAG"
            git push origin HEAD:${{ github.ref_name }}
          fi
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        # Body is the changelog's section for this release (built above), not GitHub's
        # auto-generated commit list.
        run: gh release create "$TAG" dist/*.alfredworkflow --title "$TAG" --notes-file RELEASE_NOTES.md
